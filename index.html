<!DOCTYPE html>
<html lang="ja">
<head>

        .credit:hover { color: #005bac; border-bottom: 1px solid #005bac; }
        h1 { color: #005bac; font-size: 1.6rem; border-bottom: 2px solid #005bac; padding-bottom: 10px; margin-top: 0; padding-right: 120px; }
        h2 { font-size: 1rem; margin-top: 25px; color: #333; background: #f0f4f8; padding: 8px; border-radius: 4px; display: flex; align-items: center; flex-wrap: wrap; }
        .sub-desc { font-size: 0.75rem; font-weight: normal; color: #666; margin-left: 10px; }
        .grid-targets { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 10px; margin-bottom: 20px; }
        .target-box { display: flex; flex-direction: column; }
        .target-box label { font-size: 0.8rem; font-weight: bold; margin-bottom: 4px; }
        .target-box input { padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        .scroll-x { overflow-x: auto; margin-top: 10px; border: 1px solid #ddd; background: #fff; }
        table { border-collapse: collapse; width: 100%; min-width: 800px; font-size: 0.9rem; }
        th, td { border: 1px solid #eee; padding: 10px 5px; text-align: center; }
        th { background: #f8f9fa; }
        .row-label { text-align: left; font-weight: bold; padding-left: 10px; background: #fafafa; width: 120px; }
        input[type="number"] { width: 80%; padding: 5px; border: 1px solid #ddd; border-radius: 3px; text-align: right; }
        #inventory-body tr:nth-child(even), #inventory-body tr:nth-child(even) .row-label { background-color: #fffde7; }
        .btn-container { display: flex; justify-content: center; gap: 10px; margin-top: 20px; flex-wrap: wrap; }

        .btn-calc { background: #005bac; color: #fff; width: 220px; }
        .retro-font { font-family: 'DotGothic16', sans-serif !important; letter-spacing: 1px; }
        .btn-jumon { background: #6f42c1; color: #fff; box-shadow: 0 4px 0 #4e2e8a; }
        .btn-reset { background: #dc3545; color: #fff; box-shadow: 0 4px 0 #a71d2a; }
        .btn-copy { background: #6c757d; color: #fff; box-shadow: 0 4px 0 #495057; }
        .btn-ss { background: #28a745; color: #fff; box-shadow: 0 4px 0 #1e7e34; }
        #jumon-input-area { background: #f8f9fa; padding: 20px; border-radius: 8px; margin-top: 15px; display: none; border: 2px solid #6f42c1; }
        #jumon-text-input { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #ccc; font-family: monospace; box-sizing: border-box; }
        .jumon-help-text { font-size: 0.8rem; color: #666; margin-top: 5px; margin-bottom: 15px; line-height: 1.5; }
        #modal-overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); z-index:1000; justify-content:center; align-items:center; }
        .modal-content { background:#fff; padding:25px; border-radius:12px; max-width:600px; width:95%; text-align:center; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        .modal-msg-main { font-weight: bold; margin-bottom: 8px; display: block; font-size: 1rem; }
        .modal-msg-sub { font-size: 0.8rem; color: #666; display: block; margin-bottom: 20px; line-height: 1.5; }
        /* 呪文表示領域：画像プレビュー時は max-height を大きく取る */
        .jumon-display { background: #f0f0f0; padding: 10px; border-radius: 5px; font-family: monospace; word-break: break-all; margin-bottom: 20px; border: 1px solid #ddd; max-height: 400px; overflow-y: auto; }
        .bg-red { background-color: #ffebed !important; color: #d32f2f; font-weight: bold; }
        .bg-yellow { background-color: #fffde7 !important; color: #856404; font-weight: bold; }

<body>

<div class="container">
    <a href="https://x.com/yucky_games" target="_blank" rel="noopener noreferrer" class="credit">made by ゆっきー</a>
    <h1>装備在庫カンリくん</h1>
    <h2>[1] 各装備の目標確保人数を設定</h2>

    <div id="result-area" style="display:none;">

        </div>
        <div class="btn-container">

</div>

</div>

        "5-1": ["バッジ", "ヘアピン", "時計"],"5-2": ["ヘアピン", "時計", "ネックレス"],"5-3": ["ヘアピン", "お守り", "時計"],"5-4": ["お守り", "時計", "ネックレス"],"5-5": ["バッジ", "お守り", "ネックレス"],
        "7-1": ["帽子", "手袋", "靴"],"7-2": ["帽子", "手袋", "バッグ"],"7-3": ["帽子", "手袋", "靴"],"7-4": ["靴", "バッグ", "ヘアピン"],"7-5": ["帽子", "バッグ", "バッジ"],
        "8-1": ["バッジ", "ヘアピン", "時計"],"8-2": ["ヘアピン", "時計", "ネックレス"],"8-3": ["ヘアピン", "お守り", "時計"],"8-4": ["お守り", "時計", "ネックレス"],"8-5": ["バッジ", "お守り", "ネックレス"],

        "11-1": ["バッジ", "ヘアピン", "時計"],"11-2": ["ヘアピン", "時計", "ネックレス"],"11-3": ["ヘアピン", "お守り", "時計"],"11-4": ["お守り", "時計", "ネックレス"],"11-5": ["バッジ", "お守り", "ネックレス"],
        "13-1": ["手袋", "帽子", "靴"],"13-2": ["バッジ", "手袋", "帽子"],"13-3": ["ヘアピン", "帽子", "靴"],"13-4": ["バッグ", "ヘアピン", "靴"],"13-5": ["バッジ", "手袋", "帽子"],
        "14-1": ["お守り", "時計", "ネックレス"],"14-2": ["ヘアピン", "お守り", "時計"],"14-3": ["バッグ", "時計", "ネックレス"],"14-4": ["バッジ", "お守り", "時計"],"14-5": ["バッグ", "ヘアピン", "ネックレス"],

        "17-1": ["お守り", "ネックレス", "時計"],"17-2": ["ヘアピン", "お守り", "時計"],"17-3": ["バッグ", "ネックレス", "時計"],"17-4": ["バッジ", "お守り", "時計"],"17-5": ["ヘアピン", "バッグ", "ネックレス"],
        "19-1": ["靴", "手袋", "帽子"],"19-2": ["バッジ", "手袋", "帽子"],"19-3": ["ヘアピン", "靴", "帽子"],"19-4": ["ヘアピン", "バッグ", "靴"],"19-5": ["バッジ", "手袋", "帽子"],
        "20-1": ["ネックレス", "時計", "お守り"],"20-2": ["時計", "お守り", "ヘアピン"],"20-3": ["ネックレス", "時計", "バッグ"],"20-4": ["時計", "お守り", "バッジ"],"20-5": ["ネックレス", "ヘアピン", "バッグ"],
        "22-1": ["靴", "手袋", "帽子"],"22-2": ["バッジ", "手袋", "帽子"],"22-3": ["ヘアピン", "靴", "帽子"],"22-4": ["ヘアピン", "バッグ", "靴"],"22-5": ["バッジ", "手袋", "帽子"],
        "23-1": ["ネックレス", "時計", "お守り"],"23-2": ["時計", "お守り", "ヘアピン"],"23-3": ["ネックレス", "時計", "バッグ"],"23-4": ["時計", "お守り", "バッジ"],"23-5": ["ネックレス", "ヘアピン", "バッグ"],
        "25-1": ["靴", "手袋", "帽子"],"25-2": ["バッジ", "手袋", "帽子"],"25-3": ["ヘアピン", "靴", "帽子"],"25-4": ["ヘアピン", "バッジ", "バッグ"],"25-5": ["バッジ", "手袋", "帽子"],
        "26-1": ["ネックレス", "時計", "お守り"],"26-2": ["時計", "ヘアピン", "靴"],"26-3": ["時計", "お守り", "バッグ"],"26-4": ["時計", "バッジ", "手袋"],"26-5": ["ネックレス", "ヘアピン", "バッグ"],
        "28-1": ["靴", "帽子", "手袋"],"28-2": ["バッジ", "帽子", "手袋"],"28-3": ["ヘアピン", "靴", "帽子"],"28-4": ["ヘアピン", "バッジ", "バッグ"],"28-5": ["バッジ", "帽子", "手袋"],
        "29-1": ["お守り", "ネックレス", "時計"],"29-2": ["ヘアピン", "靴", "時計"],"29-3": ["バッグ", "お守り", "時計"],"29-4": ["バッジ", "手袋", "時計"],"29-5": ["ヘアピン", "バッグ", "ネックレス"]
    };

    // iOS Safari 判定
    function isIosSafari() {
        const ua = window.navigator.userAgent;
        const isIPhone = !!ua.match(/iPhone/i);
        const isSafari = !!ua.match(/Safari/i) && !ua.match(/CriOS/i) && !ua.match(/Chrome/i);
        return isIPhone && isSafari;
    }

    function initApp() {
        const targetDiv = document.getElementById('target-inputs');
        const invBody = document.getElementById('inventory-body');
        const tableHead = document.getElementById('table-head');
        const resultHead = document.getElementById('result-head');
        TIERS.forEach(t => {
            const th = document.createElement('th'); th.innerText = 'T' + t;
            tableHead.appendChild(th); resultHead.appendChild(th.cloneNode(true));
        });
        EQUIP_LIST.forEach((eq, i) => {
            targetDiv.innerHTML += `<div class="target-box"><label>${eq.name}</label><input type="number" id="target-${i}" value="${eq.def}" min="0" onfocus="this.select()"></div>`;
            let row = `<tr><td class="row-label">${eq.name}</td>`;
            TIERS.forEach(t => row += `<td><input type="number" id="inv-${i}-${t}" value="0" min="0" onfocus="this.select()"></td>`);
            invBody.innerHTML += row + `</tr>`;
        });
        let boxRow = `<tr><td class="row-label">選択ボックス</td>`;
        TIERS.forEach(t => boxRow += `<td><input type="number" id="box-${t}" value="0" min="0" onfocus="this.select()"></td>`);
        invBody.innerHTML += boxRow + `</tr>`;
        const hash = window.location.hash.substring(1);
        if (hash) { if (loadFromDataString(hash)) runCalculation(); } 
        else { const saved = localStorage.getItem(STORAGE_KEY); if (saved) loadFromDataString(saved); }
    }

    function confirmReset() {
        if (confirm("リセットしますか？")) {
            localStorage.removeItem(STORAGE_KEY);
            location.reload();
        }
    }

    function generateDataString() {
        const data = [];
        EQUIP_LIST.forEach((_, i) => data.push(parseInt(document.getElementById(`target-${i}`).value) || 0));
        EQUIP_LIST.forEach((_, i) => TIERS.forEach(t => data.push(parseInt(document.getElementById(`inv-${i}-${t}`).value) || 0)));
        TIERS.forEach(t => data.push(parseInt(document.getElementById(`box-${t}`).value) || 0));
        let bytes = [];
        data.forEach(v => {
            while (v >= 0x80) { bytes.push((v & 0x7f) | 0x80); v >>>= 7; }
            bytes.push(v);
        });
        return btoa(String.fromCharCode(...pako.deflate(new Uint8Array(bytes)))).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
    }

    function loadFromDataString(str) {
        try {
            const bin = atob(str.replace(/-/g, '+').replace(/_/g, '/'));
            const decompressed = pako.inflate(new Uint8Array(bin.length).map((_, i) => bin.charCodeAt(i)));
            let data = [], i = 0;
            while (i < decompressed.length) {
                let v = 0, shift = 0, b;
                do { b = decompressed[i++]; v |= (b & 0x7f) << shift; shift += 7; } while (b & 0x80);
                data.push(v);
            }
            let ptr = 0;
            EQUIP_LIST.forEach((_, i) => document.getElementById(`target-${i}`).value = data[ptr++]);
            EQUIP_LIST.forEach((_, i) => TIERS.forEach(t => document.getElementById(`inv-${i}-${t}`).value = data[ptr++]));
            TIERS.forEach(t => document.getElementById(`box-${t}`).value = data[ptr++]);
            return true;
        } catch (e) { return false; }
    }

    function runCalculation() {
        const resBody = document.getElementById('result-body');
        const sumBody = document.getElementById('summary-body');
        const now = new Date();
        document.getElementById('result-title').innerText = `計算結果：目標との差分（${now.getMonth() + 1}月${now.getDate()}日時点）`;
        resBody.innerHTML = ""; sumBody.innerHTML = "";
        
        let tDeficits = {}; TIERS.forEach(t => tDeficits[t] = 0);
        let currentDeficits = []; // 初期不足リスト

        EQUIP_LIST.forEach((eq, i) => {
            const targetNum = parseInt(document.getElementById(`target-${i}`).value) || 0;
            let row = `<tr><td class="row-label">${eq.name}</td>`;
            TIERS.forEach(t => {
                const goal = REQ_PER_PERSON[t] * targetNum;
                const have = parseInt(document.getElementById(`inv-${i}-${t}`).value) || 0;
                const diff = have - goal;
                let cls = diff < 0 ? "bg-red" : (diff < 100 ? "bg-yellow" : "bg-green");
                if (diff < 0) tDeficits[t] += diff;
                row += `<td class="${cls}">${diff}</td>`;
                currentDeficits.push({ tier: t, item: eq.name, diff: diff });
            });
            resBody.innerHTML += row + `</tr>`;
        });
        
        let htmlDeficit = `<tr class="summary-header"><td class="row-label">T別不足数合計</td>`;
        TIERS.forEach(t => htmlDeficit += `<td>${tDeficits[t]}</td>`);
        sumBody.innerHTML += htmlDeficit + `</tr>`;
        
        let boxFinal = {};
        let htmlFinal = `<tr class="summary-header"><td class="row-label">ボックス考慮後</td>`;
        TIERS.forEach(t => {
            const boxCount = parseInt(document.getElementById(`box-${t}`).value) || 0;
            const finalVal = tDeficits[t] + boxCount;
            boxFinal[t] = finalVal;
            let cls = finalVal < 0 ? "bg-red" : (finalVal < 100 ? "bg-yellow" : "bg-green");
            htmlFinal += `<td class="${cls}">${finalVal}</td>`;
        });
        sumBody.innerHTML += htmlFinal + `</tr>`;
        
        document.getElementById('result-area').style.display = 'block';
        localStorage.setItem(STORAGE_KEY, generateDataString());

        calculateRoadmap(currentDeficits, boxFinal);
    }

    // 周回提案アルゴリズム Ver 2.1 (外科的順位入れ替え)
    function calculateRoadmap(deficits, boxResults) {
        let snapshot = deficits.map(d => ({ ...d }));
        let vBox = { ...boxResults };
        let groups = { g1: [], g2: [], g3: [] };

        snapshot.forEach(item => {
            if (item.diff < 0) {
                if (vBox[item.tier] < 0) groups.g1.push(item);
                else groups.g2.push(item);
            } else { groups.g3.push(item); }
        });

        // ソート: 不足数(昇順) -> Tier(降順)
        const sorter = (a, b) => a.diff - b.diff || b.tier - a.tier;
        groups.g1.sort(sorter); groups.g2.sort(sorter);

        let ranking = [...groups.g1, ...groups.g2, ...groups.g3].slice(0, 10);
        
        // 探索用メインマップ生成
        let priMap = {};
        for(let s in MASTER_STAGE_DATA) { priMap[MASTER_STAGE_DATA[s][0] + "_" + getTier(s)] = s; }

        let tempRanking = ranking.map(r => ({ ...r, solved: false }));
        let proposedStages = [];

        // 提案ロジックループ (最大5回)
        for (let i = 0; i < 5; i++) {
            let target = tempRanking.find(r => !r.solved);
            if (!target) break;

            let stageName = priMap[target.item + "_" + target.tier];
            
            // 外科的順位入れ替え判定
            if (!stageName && target.tier <= 8) {
                let priT10 = priMap[target.item + "_10"];
                if (priT10) {
                    tempRanking.sort((a, b) => {
                        if(a.solved && !b.solved) return 1; if(!a.solved && b.solved) return -1;
                        if(a.name === target.name && b.name !== target.name) return 1;
                        if(a.name !== target.name && b.name === target.name) return -1;
                        return 0; // 原則維持
                    });
                    i--; continue; // 同じスロットで再抽選
                }
            }

            if (stageName) {
                proposedStages.push(stageName);
                markSolved(tempRanking, stageName);
            } else {
                target.solved = true; // 掘れないものはスキップ
                i--;
            }
        }

        displayRoadmap(proposedStages.slice(0, 5));
    }

    function markSolved(ranking, stageName) {
        const items = MASTER_STAGE_DATA[stageName];
        const t = getTier(stageName);
        const solvedKeys = [
            `${items[0]}_${t}`, `${items[1]}_${t}`, `${items[2]}_${t}`, // メイン・サブ
            `${items[0]}_${t-2}`, `${items[1]}_${t-2}`, `${items[2]}_${t-2}`, // 下位T-2
            `${items[0]}_${t-3}`, `${items[1]}_${t-3}`, `${items[2]}_${t-3}`  // 下位T-3
        ];
        ranking.forEach(r => { if (solvedKeys.includes(`${r.item}_${r.tier}`)) r.solved = true; });
    }

    function getTier(s) {
        const a = parseInt(s.split('-')[0]);
        if(a<=2) return 1; if(a<=5) return 2; if(a<=8) return 3; if(a<=11) return 4; if(a<=14) return 5;
        if(a<=17) return 6; if(a<=20) return 7; if(a<=23) return 8; if(a<=26) return 9; return 10;
    }

    function displayRoadmap(stages) {
        const listEl = document.getElementById('stage-list');
        listEl.innerHTML = "";
        stages.forEach((s, i) => {
            const t = getTier(s);
            const items = MASTER_STAGE_DATA[s];
            const num = ['①','②','③','④','⑤'][i];
            listEl.innerHTML += `<span class="stage-box">${num} ${s}（T${t}${items[0]}/${items[1]}/${items[2]}）</span>`;
            if (i < stages.length - 1) listEl.innerHTML += `<span>→</span>`;
        });
        document.getElementById('recommendation-display').style.display = stages.length > 0 ? "block" : "none";
    }

    function toggleJumonInput() {
        const area = document.getElementById('jumon-input-area');
        area.style.display = (area.style.display === "none" || area.style.display === "") ? "block" : "none";
    }

    function restoreFromJumon() {
        let jumon = document.getElementById('jumon-text-input').value.trim();
        if (jumon.includes('#')) jumon = jumon.split('#')[1];
        if (loadFromDataString(jumon)) {
            runCalculation();
            document.getElementById('jumon-input-area').style.display = "none";
        } else { alert("呪文が正しくありません。"); }
    }

    function showExportModal() {
        const modal = document.getElementById('modal-overlay');
        document.querySelector('.modal-msg-main').innerText = "じゅもんを保存してください";
        document.querySelector('.modal-msg-sub').innerText = "コピーして保存するかURLをご利用ください";
        document.getElementById('modal-btns').style.display = 'flex';
        document.getElementById('jumon-str').style.fontFamily = 'monospace';
        document.getElementById('jumon-str').innerText = generateDataString();
        modal.style.display = 'flex';
    }

    function closeModal() {
        document.getElementById('modal-overlay').style.display = 'none';
        // モーダル内容を元に戻す
        document.getElementById('jumon-str').innerHTML = "";
        document.getElementById('modal-btns').style.display = 'flex';
    }

    async function copyToClipboard(type) {
        const jumon = document.getElementById('jumon-str').innerText;
        const text = type === 'url' ? window.location.origin + window.location.pathname + "#" + jumon : jumon;
        await navigator.clipboard.writeText(text);
        alert("コピーしました");
    }

    async function generateCanvas() {
        const target = document.getElementById('capture-target');
        const wrapper = document.getElementById('table-wrapper');
        
        // キャプチャ時のみ強制的にPC版の横幅にするクラスを付与
        wrapper.classList.add('capture-mode');
        
        // html2canvasに横幅を明示的に伝える
        const options = {
            backgroundColor: "#ffffff",
            scale: 2,
            width: 890, // PC版のコンテンツ幅目安
            useCORS: true
        };
        
        const canvas = await html2canvas(target, options);
        wrapper.classList.remove('capture-mode');
        return canvas;
    }

    async function takeScreenshot() {
        try {
            const canvas = await generateCanvas();
            const link = document.createElement('a');
            link.href = canvas.toDataURL("image/png");
            link.download = `inventory.png`;
            link.click();
        } catch (e) { alert("保存に失敗しました。"); }
    }

    async function copyScreenshot() {
        const btn = document.getElementById('copy-btn');
        try {
            const canvas = await generateCanvas();

            // iPhone Safari かどうかの判定
            if (isIosSafari()) {
                // 画像を DataURL に変換
                const dataUrl = canvas.toDataURL("image/png");
                // 既存のモーダルを流用して画像を表示
                const jumonStr = document.getElementById('jumon-str');
                const modalBtns = document.getElementById('modal-btns');
                const msgMain = document.querySelector('.modal-msg-main');
                const msgSub = document.querySelector('.modal-msg-sub');

                // モーダルの表示内容を画像用に書き換える
                msgMain.innerText = "画像を長押しして「コピー」を選択してください";
                msgSub.innerText = "iOS Safariの制限によりボタンでの直接コピーができないため、この方式をとっています。";
                jumonStr.style.fontFamily = 'inherit';
                jumonStr.innerHTML = `<img src="${dataUrl}" style="max-width:100%; height:auto; border:1px solid #ccc; box-shadow:0 2px 5px rgba(0,0,0,0.1);">`;
                modalBtns.style.display = 'none'; // 不要なボタンを隠す

                document.getElementById('modal-overlay').style.display = 'flex';
                return; // ここで処理を抜ける
            }

            // それ以外のブラウザ（PC, Android Chromeなど）は直接コピー
            canvas.toBlob(async (blob) => {
                const item = new ClipboardItem({ "image/png": blob });
                await navigator.clipboard.write([item]);
                const oldText = btn.innerText;
                btn.innerText = "コピー完了！";
                btn.style.backgroundColor = "#28a745";
                setTimeout(() => {
                    btn.innerText = oldText;
                    btn.style.backgroundColor = "#6c757d";
                }, 2000);
            });
        } catch (err) {
            console.error(err);
            alert("コピーに失敗しました。HTTPS環境で利用してください。");
        }
    }

    window.addEventListener('DOMContentLoaded', initApp);
</script>
