        "22-1":"T8靴/T8手袋/T8帽子","22-2":"T8バッジ/T8手袋/T8帽子","22-3":"T8ヘアピン/T8靴/T8帽子","22-4":"T8ヘアピン/T8バッグ/T8靴","22-5":"T8バッジ/T8手袋/T8帽子",

        "25-1":"T9靴/T9手袋/T9帽子","25-2":"T9バッジ/T9手袋/T9帽子","25-3":"T9ヘアピン/T9靴/T9帽子","25-4":"T9ヘアピン/T9バッジ/T9バッグ","25-5":"T9バッジ/T9手袋/T9帽子",
        "26-1":"T9ネックレス/T9時計/T9お守り","26-2":"T9時計/T9ヘアピン/T9靴","26-3":"T9時計/T9お守り/T9バッグ","26-4":"T9時計/T9バッジ/T9手袋","26-5":"T9ネックレス/T9ヘアピン/T9バッグ",
        "28-1":"T10靴/T10帽子/T10手袋","28-2":"T10バッジ/T10帽子/T10手袋","28-3":"T10ヘアピン/T10靴/T10帽子","28-4":"T10ヘアピン/T10バッジ/T10バッグ","28-5":"T10バッジ/T10帽子/T10手袋",
        "29-1":"T10お守り/T10ネックレス/T10時計","29-2":"T10ヘアピン/T10靴/T10時計","29-3":"T10バッグ/T10お守り/T10時計","29-4":"T10バッジ/T10手袋/T10時計","29-5":"T10ヘアピン/T10バッグ/T10ネックレス"
    };

    function initApp() {
        const targetDiv = document.getElementById('target-inputs');
        const invBody = document.getElementById('inventory-body');
        const tableHead = document.getElementById('table-head');
        const resultHead = document.getElementById('result-head');
        TIERS.forEach(t => {
            const th = document.createElement('th'); th.innerText = 'T' + t;
            tableHead.appendChild(th); resultHead.appendChild(th.cloneNode(true));
        });
        EQUIP_LIST.forEach((eq, i) => {
            targetDiv.innerHTML += `<div class="target-box"><label>${eq.name}</label><input type="number" id="target-${i}" value="${eq.def}" min="0" onfocus="this.select()"></div>`;
            let row = `<tr><td class="row-label">${eq.name}</td>`;
            TIERS.forEach(t => row += `<td><input type="number" id="inv-${i}-${t}" value="0" min="0" onfocus="this.select()"></td>`);
            invBody.innerHTML += row + `</tr>`;
        });
        let boxRow = `<tr><td class="row-label">選択ボックス</td>`;
        TIERS.forEach(t => boxRow += `<td><input type="number" id="box-${t}" value="0" min="0" onfocus="this.select()"></td>`);
        invBody.innerHTML += boxRow + `</tr>`;
        const hash = window.location.hash.substring(1);
        if (hash) { if (loadFromDataString(hash)) runCalculation(); } 
        else { const saved = localStorage.getItem(STORAGE_KEY); if (saved) loadFromDataString(saved); }
    }

    function runCalculation() {
        const resBody = document.getElementById('result-body');
        const sumBody = document.getElementById('summary-body');
        const now = new Date();
        document.getElementById('result-title').innerText = `計算結果：目標との差分（${now.getMonth() + 1}月${now.getDate()}日時点）`;
        resBody.innerHTML = ""; sumBody.innerHTML = "";
        let tDeficits = {}; TIERS.forEach(t => tDeficits[t] = 0);
        let inventorySnapshot = [];

        EQUIP_LIST.forEach((eq, i) => {
            const targetNum = parseInt(document.getElementById(`target-${i}`).value) || 0;
            let row = `<tr><td class="row-label">${eq.name}</td>`;
            TIERS.forEach(t => {
                const goal = REQ_PER_PERSON[t] * targetNum;
                const have = parseInt(document.getElementById(`inv-${i}-${t}`).value) || 0;
                const diff = have - goal;
                let cls = diff < 0 ? "bg-red" : (diff < 100 ? "bg-yellow" : "bg-green");
                if (diff < 0) tDeficits[t] += diff;
                row += `<td class="${cls}">${diff}</td>`;
                inventorySnapshot.push({ tier: t, name: eq.name, diff: diff });
            });
            resBody.innerHTML += row + `</tr>`;
        });

        let boxDiffs = {};
        let htmlFinal = `<tr class="summary-header"><td class="row-label">ボックス考慮後</td>`;
        TIERS.forEach(t => {
            const boxCount = parseInt(document.getElementById(`box-${t}`).value) || 0;
            const finalVal = tDeficits[t] + boxCount;
            boxDiffs[t] = finalVal;
            let cls = finalVal < 0 ? "bg-red" : (finalVal < 100 ? "bg-yellow" : "bg-green");
            htmlFinal += `<td class="${cls}">${finalVal}</td>`;
        });
        sumBody.innerHTML += htmlFinal + `</tr>`;
        
        document.getElementById('result-area').style.display = 'block';
        localStorage.setItem(STORAGE_KEY, generateDataString());
        generateRoadmap(inventorySnapshot, boxDiffs);
    }

    function parseEquip(s) {
        let parts = s.split('/');
        return parts.map(p => {
            let m = p.trim().match(/T(\d+)(.+)/);
            return m ? { tier: parseInt(m[1]), name: m[2] } : null;
        });
    }

    function generateRoadmap(snapshot, boxDiffs) {
        let allItems = snapshot.map(item => {
            let group = 3;
            if (boxDiffs[item.tier] < 0 && item.diff < 0) group = 1;
            else if (item.diff < 0) group = 2;
            return { ...item, group: group, itemRank: EQUIP_LIST.findIndex(e => e.name === item.name) };
        });

        allItems.sort((a, b) => {
            if (a.group !== b.group) return a.group - b.group;
            if (a.diff !== b.diff) return a.diff - b.diff;
            if (a.tier !== b.tier) return b.tier - a.tier;
            return a.itemRank - b.itemRank;
        });

        let ranking = allItems.slice(0, 10).filter(item => item.diff < 0);
        if (ranking.length === 0) {
            document.getElementById('recommendation-display').style.display = 'none';
            return;
        }

        let proposedStages = [];
        let currentRanking = [...ranking];
        let stages = Object.keys(MASTER_STAGE_DATA);

        while (currentRanking.length > 0 && proposedStages.length < 5) {
            let target = currentRanking[0];
            let bestStageKey = null;
            
            let mainCandidates = stages.map(key => {
                let drops = parseEquip(MASTER_STAGE_DATA[key]);
                let main = drops[0];
                if (main.tier === target.tier && main.name === target.name) {
                    let overlapCount = drops.slice(1).filter(s => currentRanking.some(r => r.tier === s.tier && r.name === s.name)).length;
                    return { key, overlapCount };
                }
                return null;
            }).filter(c => c !== null);

            if (mainCandidates.length > 0) {
                mainCandidates.sort((a, b) => b.overlapCount - a.overlapCount);
                bestStageKey = mainCandidates[0].key;
            } else {
                let subCandidates = stages.filter(key => parseEquip(MASTER_STAGE_DATA[key]).slice(1).some(s => s.tier === target.tier && s.name === target.name));
                if (subCandidates.length > 0) {
                    subCandidates.sort((a, b) => {
                        let mA = parseEquip(MASTER_STAGE_DATA[a])[0], mB = parseEquip(MASTER_STAGE_DATA[b])[0];
                        return (snapshot.find(s => s.tier === mA.tier && s.name === mA.name)?.diff || 0) - (snapshot.find(s => s.tier === mB.tier && s.name === mB.name)?.diff || 0);
                    });
                    bestStageKey = subCandidates[0];
                }
            }

            if (bestStageKey) {
                proposedStages.push(bestStageKey);
                let pool = getDropPool(bestStageKey);
                currentRanking = currentRanking.filter(r => !pool.some(d => d.tier === r.tier && d.name === r.name));
            } else { currentRanking.shift(); }
        }

        // --- 最終最適化：後回し（デモート）ロジック ---
        let adjusted = true;
        let limit = 0;
        while (adjusted && limit < 10) {
            adjusted = false; limit++;
            for (let j = 1; j < proposedStages.length; j++) {
                let poolJ = getDropPool(proposedStages[j]);
                for (let i = 0; i < j; i++) {
                    let mainI = parseEquip(MASTER_STAGE_DATA[proposedStages[i]])[0];
                    // ステージJ（後方）の下位ドロップに、ステージI（前方）のメインが含まれる場合
                    if (poolJ.some(d => d.tier === mainI.tier && d.name === mainI.name)) {
                        let demoted = proposedStages.splice(i, 1)[0]; // 前方のものを抜く
                        let promoted = proposedStages.splice(j - 1, 1)[0]; // 後方のものを抜く(indexズレ補正)
                        proposedStages.unshift(promoted); // カバーした側を先頭(①)へ
                        proposedStages.push(demoted); // カバーされた側を最後尾(⑤)へ
                        adjusted = true; break;
                    }
                }
                if (adjusted) break;
            }
        }

        const listEl = document.getElementById('stage-list');
        const numCircle = ["①", "②", "③", "④", "⑤"];
        listEl.innerHTML = "";
        proposedStages.forEach((key, idx) => {
            listEl.innerHTML += `<span class="stage-box">${numCircle[idx]} ${key} (${MASTER_STAGE_DATA[key]})</span>`;
            if (idx < proposedStages.length - 1) listEl.innerHTML += "　";
        });
        document.getElementById('recommendation-display').style.display = 'block';
    }

    function getDropPool(stageKey) {
        let drops = parseEquip(MASTER_STAGE_DATA[stageKey]);
        let pool = [...drops];
        if (drops[0].tier >= 4) pool = pool.concat(drops.map(d => ({ tier: d.tier - 2, name: d.name })));
        if (drops[0].tier >= 5) pool = pool.concat(drops.map(d => ({ tier: d.tier - 3, name: d.name })));
        return pool;
    }

    function confirmReset() { if (confirm("リセットしますか？")) { localStorage.removeItem(STORAGE_KEY); location.reload(); } }
    function generateDataString() {
        const data = []; EQUIP_LIST.forEach((_, i) => data.push(parseInt(document.getElementById(`target-${i}`).value) || 0));
        EQUIP_LIST.forEach((_, i) => TIERS.forEach(t => data.push(parseInt(document.getElementById(`inv-${i}-${t}`).value) || 0)));
        TIERS.forEach(t => data.push(parseInt(document.getElementById(`box-${t}`).value) || 0));
        let bytes = []; data.forEach(v => { while (v >= 0x80) { bytes.push((v & 0x7f) | 0x80); v >>>= 7; } bytes.push(v); });
        return btoa(String.fromCharCode(...pako.deflate(new Uint8Array(bytes)))).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
    }
    function loadFromDataString(str) {
        try {
            const bin = atob(str.replace(/-/g, '+').replace(/_/g, '/'));
            const data = [], decomp = pako.inflate(new Uint8Array(bin.length).map((_,i) => bin.charCodeAt(i)));
            let i = 0; while (i < decomp.length) { let v = 0, s = 0, b; do { b = decomp[i++]; v |= (b & 0x7f) << s; s += 7; } while (b & 0x80); data.push(v); }
            let p = 0; EQUIP_LIST.forEach((_, i) => document.getElementById(`target-${i}`).value = data[p++]);
            EQUIP_LIST.forEach((_, i) => TIERS.forEach(t => document.getElementById(`inv-${i}-${t}`).value = data[p++]));
            TIERS.forEach(t => document.getElementById(`box-${t}`).value = data[p++]); return true;
        } catch (e) { return false; }
    }
    function toggleJumonInput() { let a = document.getElementById('jumon-input-area'); a.style.display = a.style.display === "block" ? "none" : "block"; }
    function restoreFromJumon() { let j = document.getElementById('jumon-text-input').value.trim(); if (loadFromDataString(j)) runCalculation(); }
    function showExportModal() { document.getElementById('jumon-str').innerText = generateDataString(); document.getElementById('modal-overlay').style.display = 'flex'; }
    function closeModal() { document.getElementById('modal-overlay').style.display = 'none'; }
    async function copyToClipboard(type) {
        const jumon = document.getElementById('jumon-str').innerText;
        const text = type === 'url' ? window.location.origin + window.location.pathname + "#" + jumon : jumon;
        await navigator.clipboard.writeText(text); alert("コピーしました！");
    }

    async function generateCanvas() {
        const target = document.getElementById('capture-target');
        target.classList.add('capture-mode');
        const canvas = await html2canvas(target, { backgroundColor: "#ffffff", scale: 2, useCORS: true, width: 890, windowWidth: 890 });
        target.classList.remove('capture-mode');
        return canvas;
    }
    async function takeScreenshot() { const c = await generateCanvas(); const l = document.createElement('a'); l.href = c.toDataURL(); l.download = `inventory.png`; l.click(); }
    async function copyScreenshot() {
        const btn = document.getElementById('copy-btn');
        const c = await generateCanvas(); 
        c.toBlob(b => {
            navigator.clipboard.write([new ClipboardItem({"image/png":b})]);
            btn.innerText = "コピー完了！"; btn.style.backgroundColor = "#28a745";
            setTimeout(() => { btn.innerText = "画像としてコピー"; btn.style.backgroundColor = "#6c757d"; }, 2000);
        });
    }
    window.addEventListener('DOMContentLoaded', initApp);
</script>
