<body>

<div class="container">
    <a href="https://x.com/yucky_games" target="_blank" rel="noopener noreferrer" class="credit">made by ゆっきー</a>

</div>

<script>
    const EQUIP_LIST = [
        { name: "帽子", def: 3 }, { name: "手袋", def: 2 }, { name: "靴", def: 3 },
        { name: "バッグ", def: 2 }, { name: "バッジ", def: 2 }, { name: "ヘアピン", def: 4 },
        { name: "お守り", def: 1 }, { name: "時計", def: 4 }, { name: "ネックレス", def: 2 }
    ];
    const REQ_PER_PERSON = { 2: 40, 3: 45, 4: 50, 5: 55, 6: 65, 7: 65, 8: 60, 9: 50, 10: 60 };
    const TIERS = [2, 3, 4, 5, 6, 7, 8, 9, 10];
    const STORAGE_KEY = 'ba_equip_manager_data';
    const AREA_KEY = 'ba_max_area_setting';

    const MASTER_DROP_LIST = {
        "1-1":["靴","手袋","帽子"],"1-2":["バッグ","手袋","帽子"],"1-3":["靴","手袋","帽子"],"1-4":["ヘアピン","バッグ","靴"],"1-5":["バッジ","バッグ","帽子"],
        "2-1":["時計","ヘアピン","バッジ"],"2-2":["ネックレス","時計","ヘアピン"],"2-3":["時計","お守り","ヘアピン"],"2-4":["ネックレス","時計","お守り"],"2-5":["ネックレス","お守り","バッジ"],
        "4-1":["帽子","手袋","靴"],"4-2":["帽子","手袋","バッグ"],"4-3":["帽子","手袋","靴"],"4-4":["靴","バッグ","ヘアピン"],"4-5":["帽子","バッグ","バッジ"],
        "5-1":["バッジ","ヘアピン","時計"],"5-2":["ヘアピン","時計","ネックレス"],"5-3":["ヘアピン","お守り","時計"],"5-4":["お守り","時計","ネックレス"],"5-5":["バッジ","お守り","ネックレス"],
        "7-1":["帽子","手袋","靴"],"7-2":["帽子","手袋","バッグ"],"7-3":["帽子","手袋","靴"],"7-4":["靴","バッグ","ヘアピン"],"7-5":["帽子","バッグ","バッジ"],
        "8-1":["バッジ","ヘアピン","時計"],"8-2":["ヘアピン","時計","ネックレス"],"8-3":["ヘアピン","お守り","時計"],"8-4":["お守り","時計","ネックレス"],"8-5":["バッジ","お守り","ネックレス"],
        "10-1":["帽子","手袋","靴"],"10-2":["帽子","手袋","バッグ"],"10-3":["帽子","手袋","靴"],"10-4":["靴","バッグ","ヘアピン"],"10-5":["帽子","バッグ","バッジ"],
        "11-1":["バッジ","ヘアピン","時計"],"11-2":["ヘアピン","時計","ネックレス"],"11-3":["ヘアピン","お守り","時計"],"11-4":["お守り","時計","ネックレス"],"11-5":["バッジ","お守り","ネックレス"],
        "13-1":["手袋","帽子","靴"],"13-2":["バッジ","手袋","帽子"],"13-3":["ヘアピン","帽子","靴"],"13-4":["バッグ","ヘアピン","靴"],"13-5":["バッジ","手袋","帽子"],
        "14-1":["お守り","時計","ネックレス"],"14-2":["ヘアピン","お守り","時計"],"14-3":["バッグ","時計","ネックレス"],"14-4":["バッジ","お守り","時計"],"14-5":["バッグ","ヘアピン","ネックレス"],
        "16-1":["手袋","靴","帽子"],"16-2":["手袋","帽子","バッジ"],"16-3":["靴","帽子","ヘアピン"],"16-4":["靴","ヘアピン","バッグ"],"16-5":["手袋","帽子","バッジ"],
        "17-1":["お守り","ネックレス","時計"],"17-2":["ヘアピン","お守り","時計"],"17-3":["バッグ","ネックレス","時計"],"17-4":["バッジ","お守り","時計"],"17-5":["ヘアピン","バッグ","ネックレス"],
        "19-1":["靴","手袋","帽子"],"19-2":["バッジ","手袋","帽子"],"19-3":["ヘアピン","靴","帽子"],"19-4":["ヘアピン","バッグ","靴"],"19-5":["バッジ","手袋","帽子"],
        "20-1":["ネックレス","時計","お守り"],"20-2":["時計","お守り","ヘアピン"],"20-3":["ネックレス","時計","バッグ"],"20-4":["時計","お守り","バッジ"],"20-5":["ネックレス","ヘアピン","バッグ"],
        "22-1":["靴","手袋","帽子"],"22-2":["バッジ","手袋","帽子"],"22-3":["ヘアピン","靴","帽子"],"22-4":["ヘアピン","バッグ","靴"],"22-5":["バッジ","手袋","帽子"],
        "23-1":["ネックレス","時計","お守り"],"23-2":["時計","お守り","ヘアピン"],"23-3":["ネックレス","時計","バッグ"],"23-4":["時計","お守り","バッジ"],"23-5":["ネックレス","ヘアピン","バッグ"],
        "25-1":["靴","手袋","帽子"],"25-2":["バッジ","手袋","帽子"],"25-3":["ヘアピン","靴","帽子"],"25-4":["ヘアピン","バッジ","バッグ"],"25-5":["バッジ","手袋","帽子"],
        "26-1":["ネックレス","時計","お守り"],"26-2":["時計","ヘアピン","靴"],"26-3":["時計","お守り","バッグ"],"26-4":["時計","バッジ","手袋"],"26-5":["ネックレス","ヘアピン","バッグ"],
        "28-1":["靴","帽子","手袋"],"28-2":["バッジ","帽子","手袋"],"28-3":["ヘアピン","靴","帽子"],"28-4":["ヘアピン","バッジ","バッグ"],"28-5":["バッジ","帽子","手袋"],
        "29-1":["お守り","ネックレス","時計"],"29-2":["ヘアピン","靴","時計"],"29-3":["バッグ","お守り","時計"],"29-4":["バッジ","手袋","時計"],"29-5":["ヘアピン","バッグ","ネックレス"]
    };

    function isIosSafari() {
        const ua = window.navigator.userAgent;
        const isIPhone = !!ua.match(/iPhone/i);
        const isSafari = !!ua.match(/Safari/i) && !ua.match(/CriOS/i) && !ua.match(/Chrome/i);
        return isIPhone && isSafari;
    }

    function initApp() {
        const targetDiv = document.getElementById('target-inputs');
        const invBody = document.getElementById('inventory-body');
        const tableHead = document.getElementById('table-head');
        const resultHead = document.getElementById('result-head');
        TIERS.forEach(t => {
            const th = document.createElement('th'); th.innerText = 'T' + t;
            tableHead.appendChild(th); resultHead.appendChild(th.cloneNode(true));
        });
        EQUIP_LIST.forEach((eq, i) => {
            targetDiv.innerHTML += `<div class="target-box"><label>${eq.name}</label><input type="number" id="target-${i}" value="${eq.def}" min="0" onfocus="this.select()"></div>`;
            let row = `<tr><td class="row-label">${eq.name}</td>`;
            TIERS.forEach(t => row += `<td><input type="number" id="inv-${i}-${t}" value="0" min="0" onfocus="this.select()"></td>`);
            invBody.innerHTML += row + `</tr>`;
        });
        let boxRow = `<tr><td class="row-label">選択ボックス</td>`;
        TIERS.forEach(t => boxRow += `<td><input type="number" id="box-${t}" value="0" min="0" onfocus="this.select()"></td>`);
        invBody.innerHTML += boxRow + `</tr>`;
        const savedArea = localStorage.getItem(AREA_KEY);
        if (savedArea) document.getElementById('max-area').value = savedArea;
        const hash = window.location.hash.substring(1);
        if (hash) { if (loadFromDataString(hash)) runCalculation(); } 
        else { const saved = localStorage.getItem(STORAGE_KEY); if (saved) loadFromDataString(saved); }
    }

    function runCalculation() {
        const resBody = document.getElementById('result-body');
        const sumBody = document.getElementById('summary-body');
        const now = new Date();
        document.getElementById('result-title').innerText = `計算結果：目標との差分（${now.getMonth() + 1}月${now.getDate()}日時点）`;
        resBody.innerHTML = ""; sumBody.innerHTML = "";
        let tDeficits = {}; TIERS.forEach(t => tDeficits[t] = 0);
        let currentDeficits = [];
        EQUIP_LIST.forEach((eq, i) => {
            const targetNum = parseInt(document.getElementById(`target-${i}`).value) || 0;
            let row = `<tr><td class="row-label">${eq.name}</td>`;
            TIERS.forEach(t => {
                const goal = REQ_PER_PERSON[t] * targetNum;
                const have = parseInt(document.getElementById(`inv-${i}-${t}`).value) || 0;
                const diff = have - goal;
                let cls = diff < 0 ? "bg-red" : (diff < 100 ? "bg-yellow" : "bg-green");
                if (diff < 0) tDeficits[t] += diff;
                row += `<td class="${cls}">${diff}</td>`;
                currentDeficits.push({ tier: t, item: eq.name, diff: diff });
            });
            resBody.innerHTML += row + `</tr>`;
        });
        let htmlDeficit = `<tr class="summary-header"><td class="row-label">T別不足数合計</td>`;
        TIERS.forEach(t => htmlDeficit += `<td>${tDeficits[t]}</td>`);
        sumBody.innerHTML += htmlDeficit + `</tr>`;
        let boxFinal = {};
        let htmlFinal = `<tr class="summary-header"><td class="row-label">ボックス考慮後</td>`;
        TIERS.forEach(t => {
            const boxCount = parseInt(document.getElementById(`box-${t}`).value) || 0;
            const finalVal = tDeficits[t] + boxCount;
            boxFinal[t] = finalVal;
            let cls = finalVal < 0 ? "bg-red" : (finalVal < 100 ? "bg-yellow" : "bg-green");
            htmlFinal += `<td class="${cls}">${finalVal}</td>`;
        });
        sumBody.innerHTML += htmlFinal + `</tr>`;
        document.getElementById('result-area').style.display = 'block';
        localStorage.setItem(STORAGE_KEY, generateDataString());
        calculateRoadmap(currentDeficits, boxFinal);
    }

    function calculateRoadmap(deficits, boxResults) {
        const maxArea = parseInt(document.getElementById('max-area').value) || 30;
        localStorage.setItem(AREA_KEY, maxArea);
        let vInv = deficits.map(d => ({ ...d }));
        let vBox = { ...boxResults };
        let recommendedStages = [];
        let usedPrimaries = [];
        let totalSimRuns = 0;
        const SIM_STEP = 30;
        let availableStages = [];
        for (let sName in MASTER_DROP_LIST) {
            const area = parseInt(sName.split('-')[0]);
            if (area <= maxArea) {
                let tier = 10;
                if (area <= 2) tier = 1; else if (area <= 5) tier = 2; else if (area <= 8) tier = 3; else if (area <= 11) tier = 4; else if (area <= 14) tier = 5; else if (area <= 17) tier = 6; else if (area <= 20) tier = 7; else if (area <= 23) tier = 8; else if (area <= 26) tier = 9;
                availableStages.push({ name: sName, tier: tier, items: MASTER_DROP_LIST[sName] });
            }
        }
        while (recommendedStages.length < 5 && totalSimRuns < 2000) {
            let targets = vInv.filter(s => s.diff < 0).map(s => {
                let weight = vBox[s.tier] < 0 ? 10.0 * Math.pow(s.tier / 10, 2) : 1.0;
                return { ...s, p_it: Math.abs(s.diff) * weight };
            });
            if (targets.length === 0) break;
            let bestStage = null;
            let maxSVS = -1;
            availableStages.forEach(st => {
                let currentSVS = 0;
                let activeNeedCount = 0;
                const primaryItem = st.items[0];
                targets.forEach(tgt => {
                    let rate = 0;
                    const isPriSlot = (tgt.item === primaryItem);
                    const mIdx = st.items.indexOf(tgt.item);
                    if (tgt.tier == st.tier && mIdx !== -1) {
                        rate = getRate(st.tier, mIdx == 0);
                        activeNeedCount++;
                    } else if (tgt.tier == st.tier - 2 && st.items.includes(tgt.item)) {
                        rate = (st.items.indexOf(tgt.item) == 0) ? 0.20 : 0.15;
                    } else if (tgt.tier == st.tier - 3 && st.items.includes(tgt.item)) {
                        rate = (st.items.indexOf(tgt.item) == 0) ? 0.10 : 0.075;
                    }
                    let score = tgt.p_it * rate;
                    if (isPriSlot && usedPrimaries.includes(tgt.item + "_" + tgt.tier)) score *= 0.1;
                    currentSVS += score;
                });
                if (activeNeedCount >= 3) currentSVS *= 1.5;
                else if (activeNeedCount >= 2) currentSVS *= 1.2;
                if (currentSVS > maxSVS) { maxSVS = currentSVS; bestStage = st; }
            });
            if (!bestStage || maxSVS <= 0) break;
            if (!recommendedStages.includes(bestStage.name)) {
                recommendedStages.push(bestStage.name);
                usedPrimaries.push(bestStage.items[0] + "_" + bestStage.tier);
            }
            totalSimRuns += SIM_STEP;
            EQUIP_LIST.forEach(eq => {
                const mIdx = bestStage.items.indexOf(eq.name);
                if (mIdx !== -1) updateV(vInv, vBox, eq.name, bestStage.tier, getRate(bestStage.tier, mIdx == 0) * SIM_STEP);
                if (bestStage.tier >= 4 && bestStage.items.includes(eq.name)) updateV(vInv, vBox, eq.name, bestStage.tier - 2, (bestStage.items.indexOf(eq.name) == 0 ? 0.20 : 0.15) * SIM_STEP);
                if (bestStage.tier >= 5 && bestStage.items.includes(eq.name)) updateV(vInv, vBox, eq.name, bestStage.tier - 3, (bestStage.items.indexOf(eq.name) == 0 ? 0.10 : 0.075) * SIM_STEP);
            });
        }
        const listEl = document.getElementById('stage-list'); listEl.innerHTML = "";
        recommendedStages.forEach((s, i) => {
            const items = MASTER_DROP_LIST[s];
            const area = parseInt(s.split('-')[0]);
            let t = 10; if (area <= 26) t = 9; if (area <= 23) t = 8; if (area <= 20) t = 7; if (area <= 17) t = 6; if (area <= 14) t = 5; if (area <= 11) t = 4; if (area <= 8) t = 3; if (area <= 5) t = 2; if (area <= 2) t = 1;
            listEl.innerHTML += `<span class="stage-box">${['①','②','③','④','⑤'][i]} ${s}（T${t}${items.join('/')}）</span>`;
            if (i < recommendedStages.length - 1) listEl.innerHTML += `<span>→</span>`;
        });
        document.getElementById('recommendation-display').style.display = recommendedStages.length > 0 ? "block" : "none";
    }

    function getRate(tier, isPri) {
        if (tier >= 5) return isPri ? 0.336 : 0.252;
        if (tier == 4) return isPri ? 0.60 : 0.45;
        return isPri ? 1.20 : 0.90;
    }
    function updateV(inv, boxes, item, tier, amt) {
        let tgt = inv.find(s => s.item === item && s.tier == tier);
        if (tgt) { tgt.diff += amt; boxes[tier] += amt; }
    }
    function updateRoadmapOnly() { runCalculation(); }
    function confirmReset() { if (confirm("リセットしますか？")) { location.reload(); } }
    function generateDataString() {
        const data = []; EQUIP_LIST.forEach((_, i) => data.push(parseInt(document.getElementById(`target-${i}`).value) || 0));
        EQUIP_LIST.forEach((_, i) => TIERS.forEach(t => data.push(parseInt(document.getElementById(`inv-${i}-${t}`).value) || 0)));
        TIERS.forEach(t => data.push(parseInt(document.getElementById(`box-${t}`).value) || 0));
        let bytes = []; data.forEach(v => { while (v >= 0x80) { bytes.push((v & 0x7f) | 0x80); v >>>= 7; } bytes.push(v); });
        return btoa(String.fromCharCode(...pako.deflate(new Uint8Array(bytes)))).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
    }
    function loadFromDataString(str) {
        try {
            const bin = atob(str.replace(/-/g, '+').replace(/_/g, '/'));
            const data = [], decomp = pako.inflate(new Uint8Array(bin.length).map((_,i) => bin.charCodeAt(i)));
            let i = 0; while (i < decomp.length) { let v = 0, s = 0, b; do { b = decomp[i++]; v |= (b & 0x7f) << s; s += 7; } while (b & 0x80); data.push(v); }
            let p = 0; EQUIP_LIST.forEach((_, i) => document.getElementById(`target-${i}`).value = data[p++]);
            EQUIP_LIST.forEach((_, i) => TIERS.forEach(t => document.getElementById(`inv-${i}-${t}`).value = data[p++]));
            TIERS.forEach(t => document.getElementById(`box-${t}`).value = data[p++]); return true;
        } catch (e) { return false; }
    }
    function toggleJumonInput() { const a = document.getElementById('jumon-input-area'); a.style.display = a.style.display === "block" ? "none" : "block"; }
    function restoreFromJumon() { let j = document.getElementById('jumon-text-input').value.trim(); if (j.includes('#')) j = j.split('#')[1]; if (loadFromDataString(j)) { runCalculation(); } }
    async function takeScreenshot() { const c = await generateCanvas(); const l = document.createElement('a'); l.href = c.toDataURL(); l.download = `inventory.png`; l.click(); }
    
    async function copyScreenshot() {
        const btn = document.getElementById('copy-btn');
        const c = await generateCanvas();
        
        if (isIosSafari()) {
            // iPhone Safari用：モーダルに画像を表示して長押しコピーを促す
            const dataUrl = c.toDataURL("image/png");
            document.getElementById('jumon-str').innerHTML = `<img src="${dataUrl}" style="width:100%; border:1px solid #ccc;">`;
            document.querySelector('.modal-msg-main').innerText = "画像を長押しして「コピー」を選択してください";
            document.querySelector('.modal-msg-sub').innerText = "iOS Safariの制限によりボタンでの直接コピーができないため、この方式をとっています。";
            document.getElementById('modal-btns').style.display = 'none'; // 不要なボタンを隠す
            document.getElementById('modal-overlay').style.display = 'flex';
            return;
        }

        c.toBlob(b => {
            navigator.clipboard.write([new ClipboardItem({"image/png":b})]);
            btn.innerText = "コピー完了！"; btn.style.backgroundColor = "#28a745";
            setTimeout(() => { btn.innerText = "画像としてコピー"; btn.style.backgroundColor = "#6c757d"; }, 2000);
        });
    }

    async function generateCanvas() { 
        const t = document.getElementById('capture-target'), w = document.getElementById('table-wrapper'); 
        w.classList.add('capture-mode'); 
        const c = await html2canvas(t, { backgroundColor: "#fff", scale: 2 }); 
        w.classList.remove('capture-mode'); return c; 
    }
    function showExportModal() { 
        document.querySelector('.modal-msg-main').innerText = "じゅもんを保存してください";
        document.querySelector('.modal-msg-sub').innerText = "コピーして保存するかURLをご利用ください";
        document.getElementById('modal-btns').style.display = 'flex';
        document.getElementById('jumon-str').innerText = generateDataString(); 
        document.getElementById('modal-overlay').style.display = 'flex'; 
    }
    function closeModal() { document.getElementById('modal-overlay').style.display = 'none'; }
    async function copyToClipboard(type) {
        const jumon = document.getElementById('jumon-str').innerText;
        const text = type === 'url' ? window.location.origin + window.location.pathname + "#" + jumon : jumon;
        await navigator.clipboard.writeText(text); alert("コピーしました！");
    }
    window.addEventListener('DOMContentLoaded', initApp);
</script>
